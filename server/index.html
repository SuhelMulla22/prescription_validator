<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Validator UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loading { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-blue-400 mb-2">Medical Prescription Validator</h1>
            <p class="text-slate-400">Interactive OpenEnv Testing Interface</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- State Panel -->
            <div class="glass rounded-xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-white">Current Prescription</h2>
                    <button id="btn-reset" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-semibold transition-colors">Start New Patient (Reset)</button>
                </div>
                <div id="patient-data" class="bg-slate-900 rounded p-4 font-mono text-sm text-green-400 min-h-[200px] overflow-y-auto whitespace-pre-wrap">
                    Click "Start New Patient" to begin...
                </div>
                <div class="mt-4 flex justify-between text-sm text-slate-400">
                    <span id="status-done">Status: Not Started</span>
                    <span id="status-reward">Total Reward: 0.0</span>
                </div>
            </div>

            <!-- Action Panel -->
            <div class="glass rounded-xl p-6 shadow-xl flex flex-col">
                <h2 class="text-xl font-semibold text-white mb-4">Pharmacist Action</h2>
                <div class="flex-grow space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Action Type</label>
                        <select id="input-action" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white outline-none focus:border-blue-500 transition-colors">
                            <option value="approve">Approve (No issues)</option>
                            <option value="flag_interaction">Flag Interaction</option>
                            <option value="flag_dosage">Flag Dosage</option>
                            <option value="flag_contraindication">Flag Contraindication</option>
                            <option value="flag_allergy">Flag Allergy</option>
                            <option value="reject">Reject Prescription</option>
                            <option value="request_clarification">Request Clarification</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Drug Name</label>
                        <input id="input-drug" type="text" placeholder="e.g. Warfarin" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Recommendation</label>
                        <input id="input-recommendation" type="text" placeholder="e.g. Decrease dosage to 50mg" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white outline-none focus:border-blue-500 transition-colors">
                    </div>
                </div>
                <button id="btn-submit" class="mt-6 w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded font-bold transition-colors">Submit Action</button>
            </div>
        </div>
        
        <!-- Feedback -->
        <div id="feedback-panel" class="mt-6 glass rounded-xl p-6 shadow-xl hidden">
            <h2 class="text-xl font-semibold text-white mb-2">Feedback</h2>
            <div id="feedback-text" class="text-lg font-semibold"></div>
        </div>

        <!-- Logs -->
        <div class="mt-6 glass rounded-xl p-6 shadow-xl">
            <h2 class="text-xl font-semibold text-white mb-2">Event Log</h2>
            <div id="log-output" class="bg-slate-900 rounded p-4 font-mono text-xs text-slate-300 h-40 overflow-y-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const log = msg => { $('log-output').innerHTML = `> ${msg}\n` + $('log-output').innerHTML; };
        let currentReward = 0.0;
        
        function displayObservation(rawData) {
            // The API returns {observation: {...}, reward, done} — unwrap it
            if (!rawData) {
                $('patient-data').textContent = 'No data received. Click "Start New Patient" to begin.';
                return;
            }
            
            // Unwrap: the observation is inside rawData.observation or rawData itself
            const obs = rawData.observation || rawData;
            const reward = rawData.reward != null ? rawData.reward : (obs.reward != null ? obs.reward : null);
            const done = rawData.done != null ? rawData.done : (obs.done === true);
            
            const displayData = {};
            
            if (obs.patient_info) {
                displayData.patient = obs.patient_info;
            }
            if (obs.prescription) {
                displayData.prescription = obs.prescription;
            }
            
            if (Object.keys(displayData).length > 0) {
                $('patient-data').textContent = JSON.stringify(displayData, null, 2);
            } else {
                $('patient-data').textContent = JSON.stringify(obs, null, 2);
            }
            
            // Update status
            const isDone = done === true;
            $('status-done').textContent = `Status: ${isDone ? 'Finished (Done)' : 'Active'}`;
            if (isDone) {
                $('status-done').classList.add('text-red-400');
            } else {
                $('status-done').classList.remove('text-red-400');
            }
            
            // Show feedback if present
            const feedback = obs.feedback || '';
            if (feedback) {
                $('feedback-panel').classList.remove('hidden');
                $('feedback-text').textContent = feedback;
                if (feedback.includes('✅')) {
                    $('feedback-text').className = 'text-lg font-semibold text-green-400';
                } else if (feedback.includes('❌')) {
                    $('feedback-text').className = 'text-lg font-semibold text-red-400';
                } else if (feedback.includes('🎯')) {
                    $('feedback-text').className = 'text-lg font-semibold text-yellow-400';
                } else {
                    $('feedback-text').className = 'text-lg font-semibold text-blue-400';
                }
            }
            return { obs, reward, done };
        }

        $('btn-reset').onclick = async () => {
            $('btn-reset').classList.add('loading');
            $('feedback-panel').classList.add('hidden');
            log('Resetting environment...');
            try {
                const res = await fetch('/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_name: 'easy' })
                });
                const data = await res.json();
                currentReward = 0.0;
                $('status-reward').textContent = `Total Reward: ${currentReward.toFixed(2)}`;
                
                // The /reset endpoint returns the observation directly
                const result = displayObservation(data);
                log('Environment reset successfully! Review the prescription and take an action.');
            } catch (e) {
                log('Reset Failed: ' + e.message);
            }
            $('btn-reset').classList.remove('loading');
        };

        $('btn-submit').onclick = async () => {
            $('btn-submit').classList.add('loading');
            const innerAction = {
                action_type: $('input-action').value,
                recommendation: $('input-recommendation').value || 'No recommendation'
            };
            // Only include drug_name if it has a value
            if ($('input-drug').value) {
                innerAction.drug_name = $('input-drug').value;
            }
            const actionPayload = { action: innerAction };
            
            log(`Submitting action: ${innerAction.action_type}...`);
            try {
                const res = await fetch('/step', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(actionPayload)
                });
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(JSON.stringify(data.detail || "Unknown API Error"));
                }
                
                const result = displayObservation(data);
                let stepReward = result.reward || 0.0;
                currentReward += stepReward;
                $('status-reward').textContent = `Total Reward: ${currentReward.toFixed(2)}`;
                log(`Action graded! Reward: ${stepReward.toFixed(2)} | Total: ${currentReward.toFixed(2)}`);
                
                if (result.done) {
                    log('=== EPISODE COMPLETE === Final reward: ' + currentReward.toFixed(2));
                }
            } catch (e) {
                log('Action Failed: ' + e.message);
            }
            $('btn-submit').classList.remove('loading');
        };

        // Show initial message
        log('Welcome! Click "Start New Patient (Reset)" to begin.');
    </script>
</body>
</html>
